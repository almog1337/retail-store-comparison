services:
  db:
    build:
      context: .
      dockerfile: Dockerfile
    image: retail-postgres:local
    container_name: retail-postgres
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      # For Postgres 18+, mount the root dir so versioned data folders work with pg_upgrade
      - pgroot:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: retail-minio
    restart: unless-stopped
    env_file:
      - ../.env
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Apache Superset
  # ---------------------------------------------------------------------------
  superset-redis:
    image: redis:7
    container_name: superset-redis
    restart: unless-stopped
    volumes:
      - superset_redis:/data

  superset-init:
    build:
      context: ./superset
      dockerfile: Dockerfile
    image: retail-superset:local
    container_name: superset-init
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      REDIS_HOST: superset-redis
      PYTHONPATH: /app/pythonpath:/app/superset_config
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/superset_config/superset_config.py:ro
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        superset db upgrade
        superset fab create-admin \
          --username "$${SUPERSET_ADMIN_USERNAME:-admin}" \
          --firstname Admin \
          --lastname User \
          --email "$${SUPERSET_ADMIN_EMAIL:-admin@superset.local}" \
          --password "$${SUPERSET_ADMIN_PASSWORD:-admin}" || true
        superset init
    depends_on:
      db:
        condition: service_healthy
      superset-redis:
        condition: service_started

  superset:
    image: retail-superset:local
    container_name: superset
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      REDIS_HOST: superset-redis
      PYTHONPATH: /app/pythonpath:/app/superset_config
    ports:
      - "8088:8088"
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/superset_config/superset_config.py:ro
    depends_on:
      superset-init:
        condition: service_completed_successfully

  superset-worker:
    image: retail-superset:local
    container_name: superset-worker
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      REDIS_HOST: superset-redis
      PYTHONPATH: /app/pythonpath:/app/superset_config
    command: ["celery", "--app=superset.tasks.celery_app:app", "worker", "--pool=prefork", "-O", "fair", "-c", "2"]
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/superset_config/superset_config.py:ro
    healthcheck:
      test: ["CMD-SHELL", "celery -A superset.tasks.celery_app:app inspect ping -d celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      superset-init:
        condition: service_completed_successfully

  superset-worker-beat:
    image: retail-superset:local
    container_name: superset-worker-beat
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      DATABASE_HOST: db
      REDIS_HOST: superset-redis
      PYTHONPATH: /app/pythonpath:/app/superset_config
    command: ["celery", "--app=superset.tasks.celery_app:app", "beat", "--pidfile", "/tmp/celerybeat.pid"]
    volumes:
      - superset_home:/app/superset_home
      - ./superset/superset_config.py:/app/superset_config/superset_config.py:ro
    healthcheck:
      disable: true
    depends_on:
      superset-init:
        condition: service_completed_successfully

volumes:
  pgroot:
  minio_data:
  superset_redis:
  superset_home:
